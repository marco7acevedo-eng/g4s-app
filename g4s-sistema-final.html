<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>G4S · Sistema Inteligente de Diagnóstico FO-PI-09</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════ TOKENS ═══════════════════════════ */
:root {
  --red:#E8262D; --red2:#B8181E; --rdim:rgba(232,38,45,.1);
  --nv:#07111F; --nv2:#0C1A2E; --nv3:#112038; --nv4:#1A2E47;
  --gold:#F0A500; --grn:#00C47A; --blu:#3D8EF0; --pur:#8B5CF6;
  --tx:#E8F0FA; --sub:#6B8CAE; --bdr:rgba(255,255,255,.06);
  --cd:rgba(255,255,255,.025); --cd2:rgba(255,255,255,.05);
  --fh:'Syne',sans-serif; --fb:'DM Sans',sans-serif; --fm:'DM Mono',monospace;
  --r:10px; --rs:7px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--nv);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(232,38,45,.06),transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 100%,rgba(61,142,240,.04),transparent 60%);
  pointer-events:none;z-index:0}

/* ══════ LAYOUT ══════ */
.app{display:flex;height:100vh;position:relative;z-index:1}
.sidebar{width:256px;background:var(--nv2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.panel{flex:1;overflow-y:auto;padding:28px 32px 40px}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ══════ SIDEBAR ══════ */
.sb-top{padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
.sb-brand{display:flex;align-items:center;gap:10px}
.g4s-badge{width:38px;height:38px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:14px;letter-spacing:1px;flex-shrink:0;box-shadow:0 2px 12px rgba(232,38,45,.3)}
.brand-text{line-height:1.3}
.brand-text b{display:block;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.2px}
.brand-text span{font-size:10px;color:var(--sub);font-weight:400}

.drive-pill{margin:10px 10px 0;padding:8px 11px;background:var(--cd2);border-radius:var(--rs);border:1px solid var(--bdr);cursor:pointer;transition:all .2s}
.drive-pill:hover{border-color:rgba(61,142,240,.3);background:rgba(61,142,240,.06)}
.dp-row{display:flex;align-items:center;gap:7px}
.dp-icon{font-size:14px}
.dp-label{font-size:11px;font-weight:600;color:var(--tx)}
.dp-status{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.dp-status.off{background:rgba(107,140,174,.15);color:var(--sub)}
.dp-status.on{background:rgba(0,196,122,.12);color:var(--grn)}
.dp-sub{font-size:10px;color:var(--sub);margin-top:3px;padding-left:21px}

.sb-nav{padding:10px 8px}
.sb-lbl{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;padding:8px 8px 4px}
.sbi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;transition:all .18s;border:1px solid transparent;margin-bottom:2px;font-size:13px;color:var(--sub);background:none;width:100%;text-align:left;font-family:var(--fb);font-weight:500}
.sbi:hover{background:var(--cd2);color:var(--tx)}
.sbi.act{background:var(--rdim);color:var(--red);border-color:rgba(232,38,45,.15)}
.sbi .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sbi .lbl{flex:1}
.sbi .cnt{font-size:10px;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-weight:700;min-width:20px;text-align:center}

.sb-hist{flex:1;overflow-y:auto;padding:2px 8px 8px}
.sb-hist::-webkit-scrollbar{width:3px}
.sh-item{padding:8px 10px;border-radius:var(--rs);cursor:pointer;transition:all .18s;border:1px solid transparent;margin-bottom:2px}
.sh-item:hover{background:var(--cd2);border-color:var(--bdr)}
.shi-cli{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shi-meta{font-size:10px;color:var(--sub);margin-top:1px}
.shi-pill{display:inline-block;font-size:9px;padding:1px 6px;border-radius:6px;margin-top:3px;font-weight:700}
.p-r{background:rgba(232,38,45,.15);color:var(--red)}
.p-g{background:rgba(240,165,0,.15);color:var(--gold)}
.p-b{background:rgba(0,196,122,.15);color:var(--grn)}
.sb-foot{padding:10px 12px;border-top:1px solid var(--bdr);font-size:10px;color:var(--sub)}
.sb-foot b{color:var(--grn)}

/* ══════ TOPBAR ══════ */
.topbar{padding:13px 32px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;flex-shrink:0;background:rgba(7,17,31,.85);backdrop-filter:blur(20px)}
.tb-title{font-family:var(--fh);font-size:19px;font-weight:700;letter-spacing:.2px}
.tb-sub{font-size:11px;color:var(--sub);margin-top:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{padding:3px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;border:1px solid transparent}
.chip-r{background:var(--rdim);color:var(--red);border-color:rgba(232,38,45,.2)}
.chip-g{background:rgba(0,196,122,.1);color:var(--grn);border-color:rgba(0,196,122,.2)}
.chip-b{background:rgba(61,142,240,.1);color:var(--blu);border-color:rgba(61,142,240,.2)}

/* ══════ CARDS ══════ */
.card{background:var(--cd);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;margin-bottom:14px}
.card-h{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(232,38,45,.1);padding-bottom:10px;margin-bottom:18px}

/* ══════ STEPS ══════ */
.steps-bar{display:flex;align-items:center;margin-bottom:22px;gap:0;flex-wrap:wrap}
.sn{display:flex;align-items:center;cursor:pointer}
.sc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid transparent;transition:all .25s;font-family:var(--fh);flex-shrink:0}
.sc.done{background:var(--grn);color:#fff;border-color:var(--grn)}
.sc.act{background:var(--red);color:#fff;box-shadow:0 0 0 4px var(--rdim)}
.sc.pend{background:rgba(255,255,255,.06);color:var(--sub);border-color:var(--bdr)}
.sl{font-size:10px;color:var(--sub);margin:0 6px;white-space:nowrap}
.sl.act{color:var(--tx);font-weight:600}
.sline{flex:1;height:1px;background:var(--bdr);min-width:8px;max-width:30px}

/* ══════ FORM ══════ */
.fld{margin-bottom:13px}
.fld label{display:block;font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px}
.fld label .req{color:var(--red);margin-left:2px}
.fld input,.fld textarea,.fld select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:var(--rs);padding:9px 13px;color:var(--tx);font-size:13px;font-family:var(--fb);outline:none;transition:border-color .2s,background .2s}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:rgba(232,38,45,.3);background:rgba(255,255,255,.06)}
.fld textarea{resize:vertical;line-height:1.6}
.fld select option{background:var(--nv3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.tags-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.tag-opt{padding:5px 13px;border-radius:20px;border:1px solid var(--bdr);background:none;color:var(--sub);cursor:pointer;font-size:12px;font-family:var(--fb);transition:all .18s}
.tag-opt:hover{border-color:rgba(232,38,45,.3);color:var(--tx)}
.tag-opt.on{border-color:var(--red);background:var(--rdim);color:var(--red);font-weight:600}

/* ══════ DOC UPLOAD ══════ */
.doc-zone{border:2px dashed rgba(139,92,246,.3);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(139,92,246,.03);margin-bottom:14px}
.doc-zone:hover,.doc-zone.drag{border-color:var(--pur);background:rgba(139,92,246,.08)}
.doc-zone .dz-icon{font-size:36px;margin-bottom:8px}
.doc-zone .dz-title{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px}
.doc-zone .dz-sub{font-size:11px;color:var(--sub);line-height:1.6}
.doc-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.15);border-radius:var(--rs)}
.doc-item .di-ico{font-size:20px;flex-shrink:0}
.doc-item .di-info{flex:1;min-width:0}
.doc-item .di-name{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-item .di-meta{font-size:10px;color:var(--sub);margin-top:2px}
.doc-item .di-status{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;flex-shrink:0}
.di-status.reading{background:rgba(240,165,0,.15);color:var(--gold)}
.di-status.done{background:rgba(0,196,122,.15);color:var(--grn)}
.doc-item .di-rm{background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;padding:0;transition:color .2s;flex-shrink:0}
.doc-item .di-rm:hover{color:var(--red)}

/* ══════ IMAGE UPLOAD ══════ */
.img-zone{border:2px dashed rgba(61,142,240,.3);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(61,142,240,.03);margin-bottom:14px}
.img-zone:hover,.img-zone.drag{border-color:var(--blu);background:rgba(61,142,240,.07)}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:12px}
.img-thumb{border-radius:var(--rs);overflow:hidden;border:1px solid var(--bdr);background:var(--cd);position:relative}
.img-thumb img{width:100%;height:90px;object-fit:cover;display:block}
.img-thumb input{width:100%;background:rgba(255,255,255,.04);border:none;border-top:1px solid var(--bdr);padding:5px 7px;color:var(--sub);font-size:10px;font-family:var(--fb);outline:none}
.img-thumb button{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(232,38,45,.8);border-radius:50%;border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ══════ MEMORY PANELS ══════ */
.mem-panel{background:rgba(61,142,240,.05);border:1px solid rgba(61,142,240,.13);border-radius:var(--r);padding:13px 15px;margin-bottom:13px}
.mem-title{font-size:10px;font-weight:700;color:var(--blu);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mem-item{font-size:11px;color:var(--sub);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
.mem-item:last-child{border:none}
.mem-item b{color:var(--tx)}

.doc-insight{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:var(--r);padding:13px 15px;margin-bottom:13px}
.doc-insight .di-title{font-size:10px;font-weight:700;color:var(--pur);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.doc-insight .di-text{font-size:12px;color:var(--sub);line-height:1.6}

/* ══════ BUTTONS ══════ */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;font-family:var(--fb);cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--sub)}
.btn-ghost:hover:not(:disabled){border-color:rgba(255,255,255,.15);color:var(--tx)}
.btn-red{background:var(--red);color:#fff;box-shadow:0 3px 14px rgba(232,38,45,.25)}
.btn-red:hover:not(:disabled){background:var(--red2)}
.btn-grn{background:var(--grn);color:#fff;box-shadow:0 3px 14px rgba(0,196,122,.2)}
.btn-grn:hover:not(:disabled){background:#00a868}
.btn-pur{background:var(--pur);color:#fff}
.btn-full{width:100%;justify-content:center;padding:13px}
.nav-row{display:flex;justify-content:space-between;margin-top:18px;gap:10px}

/* ══════ AI BOX ══════ */
.ai-box{background:linear-gradient(135deg,rgba(232,38,45,.05),rgba(61,142,240,.05));border:1px solid rgba(232,38,45,.15);border-radius:var(--r);padding:22px;margin-top:16px}
.ai-box h3{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:5px}
.ai-box p{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.7}

/* ══════ LOADING ══════ */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.spin-ring{width:56px;height:56px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:spin .85s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap h2{font-family:var(--fh);font-size:22px;margin-bottom:7px}
.loading-wrap p{color:var(--sub);font-size:13px;line-height:1.8;max-width:400px}
.dot::after{content:'';animation:dots 1.4s steps(4,end) infinite}
@keyframes dots{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.prog-bar{width:300px;height:3px;background:var(--bdr);border-radius:2px;margin-top:18px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--blu));border-radius:2px;animation:prog 60s linear forwards}
@keyframes prog{0%{width:0%}90%{width:85%}100%{width:90%}}

/* ══════ RESULT ══════ */
.result-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--cd2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center}
.kpi .kv{font-family:var(--fh);font-size:28px;font-weight:800}
.kpi .kl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.kpi.kr .kv{color:var(--red)}.kpi.kg .kv{color:var(--gold)}.kpi.kgr .kv{color:var(--grn)}.kpi.kb .kv{color:var(--blu)}
.g2r{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mc{background:var(--cd);border:1px solid var(--bdr);border-radius:var(--r);padding:14px}
.mct{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.mcb{font-size:12px;color:var(--tx);line-height:1.6}
.areas-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.area-c{background:var(--cd);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;border-top:2px solid var(--gold)}
.an{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--gold);margin-bottom:3px}
.ad{font-size:11px;color:var(--sub);line-height:1.5}
.sec-t{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:7px 10px;color:var(--sub);text-align:left;border-bottom:1px solid var(--bdr);font-size:10px;text-transform:uppercase;letter-spacing:.7px;font-weight:700}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--sub);vertical-align:top;line-height:1.4}
td.w{color:var(--tx)}
.rb{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.rb-a{background:rgba(232,38,45,.15);color:var(--red)}.rb-m{background:rgba(240,165,0,.15);color:var(--gold)}.rb-b{background:rgba(0,196,122,.15);color:var(--grn)}

/* ══════ PDF INSTRUCTIONS ══════ */
.pdf-guide{background:rgba(0,196,122,.05);border:1px solid rgba(0,196,122,.15);border-radius:var(--r);padding:16px 18px;margin-top:16px}
.pdf-guide .pg-title{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--grn);margin-bottom:10px}
.pdf-steps{display:flex;flex-direction:column;gap:7px}
.pdf-step{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--sub);line-height:1.5}
.pdf-step .ps-num{width:20px;height:20px;border-radius:50%;background:var(--grn);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ══════ HISTORY ══════ */
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px}
.hc{background:var(--cd);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.hc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red)}
.hc:hover{border-color:rgba(232,38,45,.2);transform:translateY(-2px);box-shadow:var(--shadow)}
.hc-cli{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--tx);margin-bottom:2px}
.hc-sed{font-size:11px;color:var(--sub);margin-bottom:9px}
.hc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.hc-tag{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--sub)}
.hc-acts{display:flex;gap:5px;flex-wrap:wrap}
.hca{padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-family:var(--fb);font-weight:600;transition:all .18s}
.hca-b{background:rgba(61,142,240,.12);color:var(--blu)}.hca-b:hover{background:rgba(61,142,240,.22)}
.hca-g{background:rgba(0,196,122,.12);color:var(--grn)}.hca-g:hover{background:rgba(0,196,122,.22)}
.hca-r{background:rgba(232,38,45,.12);color:var(--red)}.hca-r:hover{background:rgba(232,38,45,.22)}

/* ══════ DASHBOARD ══════ */
.dash-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-bottom:20px}
.sc2{background:var(--cd2);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.sc2::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc2.r::before{background:var(--red)}.sc2.g::before{background:var(--gold)}.sc2.gr::before{background:var(--grn)}
.sc2-num{font-family:var(--fh);font-size:36px;font-weight:800;line-height:1}
.sc2-lbl{font-size:11px;color:var(--sub);margin-top:3px}
.sc2-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.12}

/* ══════ SETTINGS ══════ */
.set-sec{background:var(--cd);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:14px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.set-row:last-child{border:none}
.set-info b{font-size:13px;color:var(--tx);display:block;margin-bottom:2px}
.set-info span{font-size:11px;color:var(--sub)}
.toggle{width:38px;height:21px;background:var(--bdr);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--grn)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:15px;height:15px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(17px)}

/* ══════ MISC ══════ */

<script>
// ══════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════
const KEY='g4s_v5', CFG='g4s_cfg5', DKEY='g4s_docs_v1';
const db  = () => { try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]} };
const dbS = l  => localStorage.setItem(KEY,JSON.stringify(l));
const cfg = () => { try{return JSON.parse(localStorage.getItem(CFG)||'{}')}catch{return{}} };

const ddb = () => { try{return JSON.parse(localStorage.getItem(DKEY)||'[]')}catch{return[]} };
const ddbS= l  => localStorage.setItem(DKEY,JSON.stringify(l));

function upsert(e){const l=db(),i=l.findIndex(x=>x.id===e.id);if(i>=0)l[i]=e;else l.unshift(e);dbS(l);sbRefresh()}
function remove(id){dbS(db().filter(e=>e.id!==id));sbRefresh()}

const STEPS=['Cliente','Entorno','Infraestructura','Incidentes','Imágenes','Base IA'];

let V='dash', STEP=0, FORM=mkForm(), DIAG=null, CUR_ID=null, REUSE=null, ERR='';

// ══════════════════════════════════════════════════════

function toast(msg,type='ok'){
  const t=document.getElementById('toast');

  setTimeout(()=>t.classList.remove('show'),3200);
}

  document.getElementById('hist-cnt').textContent=list.length;
  document.getElementById('docs-cnt').textContent=docs.length;
  document.getElementById('fcnt').textContent=list.length+' diagnóstico'+(list.length!==1?'s':'');

  if(!list.length){c.innerHTML='<div style="padding:12px 10px;font-size:11px;color:var(--sub);font-style:italic">Sin diagnósticos aún</div>';return}
  c.innerHTML=list.slice(0,10).map(e=>{
    const a=(e.diag?.riesgos||[]).filter(r=>r.nivel==='ALTO').length;
    const cls=a>=3?'p-r':a>=1?'p-g':'p-b';

      <div class="shi-cli">${e.form.cliente||'Sin nombre'}</div>
      <div class="shi-meta">${e.form.municipio||''} · ${e.fecha||''}</div>
      <span class="shi-pill ${cls}">${lbl}</span>

    <div class="sc2 gr"><div class="sc2-ico">📚</div><div class="sc2-num">${docs.length}</div><div class="sc2-lbl">Documentos en base IA</div></div>

    </div>
    <div class="card"><div class="card-h">📍 Municipios cubiertos</div>
      ${cities.slice(0,8).map(m=>{const cnt=list.filter(e=>e.form.municipio===m).length;return`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:12px;color:var(--tx);flex:1">${m}</span><span style="font-size:11px;background:var(--rdim);color:var(--red);padding:1px 8px;border-radius:8px;font-weight:600">${cnt}</span></div>`}).join('')}
    </div>
  </div>
  <div class="card"><div class="card-h">🕐 Diagnósticos recientes</div>
    <div class="hist-grid">${list.slice(0,3).map(e=>buildHC(e)).join('')}
    <div class="hc" onclick="go('hist')" style="display:flex;align-items:center;justify-content:center;min-height:100px;border-style:dashed"><div style="text-align:center;color:var(--sub)"><div style="font-size:22px;margin-bottom:5px">📋</div><div style="font-size:12px">Ver todo el historial</div></div></div>

// ══════════════════════════════════════════════════════
// BASE DE CONOCIMIENTO
// ══════════════════════════════════════════════════════
function renderDocs(){
  const docs=ddb(), p=document.getElementById('panel');
  const docTypes={
    'application/pdf':'📄',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document':'📝',
    'application/msword':'📝',
    'text/plain':'📃',
    'default':'📎'
  };
  p.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-family:var(--fh);font-size:21px;font-weight:700">Base de Conocimiento IA</div>
      <div style="color:var(--sub);font-size:12px;margin-top:2px">Documentos que la IA usa para mejorar diagnósticos y recomendaciones</div>
    </div>
  </div>

  <div class="doc-zone" id="kb-zone" onclick="document.getElementById('kb-inp').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleKBDrop(event)">
    <div class="dz-icon">📚</div>
    <div class="dz-title">Subir documentos a la Base de Conocimiento</div>
    <div class="dz-sub">Diagnósticos anteriores (Word/PDF) · Reportes de incidentes · Estadísticas de criminalidad<br>La IA extrae y aprende del contenido automáticamente</div>
  </div>
  <input type="file" id="kb-inp" accept=".pdf,.doc,.docx,.txt" multiple style="display:none" onchange="handleKBFiles(this.files)">

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:4px">
    ${docs.length?docs.map(doc=>`
      <div style="background:var(--cd);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;border-left:3px solid var(--pur)">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">
          <span style="font-size:24px;flex-shrink:0">${docTypes[doc.type]||docTypes.default}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${doc.name}</div>
            <div style="font-size:10px;color:var(--sub);margin-top:2px">${doc.fecha} · ${doc.size}</div>
            <div style="font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(139,92,246,.12);color:var(--pur);margin-top:4px;display:inline-block;font-weight:600">${doc.category}</div>
          </div>
          <button onclick="removeDoc('${doc.id}');renderDocs()" style="background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;padding:0;transition:color .2s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--sub)'">✕</button>
        </div>
        <div style="font-size:11px;color:var(--sub);line-height:1.5;border-top:1px solid var(--bdr);padding-top:8px">${doc.summary||'Procesando contenido...'}</div>
      </div>`).join('')
    :`<div class="empty" style="grid-column:1/-1;padding:40px 20px">
        <div class="ei">📚</div>
        <h3>Base de conocimiento vacía</h3>
        <p>Sube diagnósticos anteriores, reportes de incidentes o estadísticas de criminalidad para que la IA aprenda y mejore sus recomendaciones.</p>
      </div>`}
  </div>`;
}

async function handleKBFiles(files){
  for(const f of [...files]){
    const docId='doc_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const size=f.size<1024?f.size+'B':f.size<1048576?(f.size/1024).toFixed(1)+'KB':(f.size/1048576).toFixed(1)+'MB';
    const cat=guessCategory(f.name,f.type);
    const doc={id:docId,name:f.name,type:f.type,size,category:cat,fecha:new Date().toLocaleDateString('es-CO'),summary:'Extrayendo contenido con IA...',content:''};
    addDoc(doc);
    if(V==='docs') renderDocs();
    // Extract content and summarize
    try{
      const b64=await fileToB64(f);
      const summary=await extractDocContent(f,b64);
      const l=ddb(),idx=l.findIndex(d=>d.id===docId);
      if(idx>=0){l[idx].summary=summary;l[idx].content=summary;ddbS(l);}
      toast(`✓ ${f.name} procesado`);
      if(V==='docs') renderDocs();
    }catch(e){
      const l=ddb(),idx=l.findIndex(d=>d.id===docId);
      if(idx>=0){l[idx].summary='Error al procesar: '+e.message;ddbS(l);}
      if(V==='docs') renderDocs();
    }
  }
}

function handleKBDrop(e){
  e.preventDefault();document.getElementById('kb-zone').classList.remove('drag');
  handleKBFiles(e.dataTransfer.files);
}

function guessCategory(name,type){
  const n=name.toLowerCase();
  if(n.includes('incidente')||n.includes('reporte')) return 'Reporte de Incidentes';
  if(n.includes('estadisticas')||n.includes('criminalidad')||n.includes('delito')) return 'Estadísticas Criminalidad';
  if(n.includes('diagnostico')||n.includes('fo-pi')||n.includes('seguridad')) return 'Diagnóstico Previo';
  if(type==='application/pdf') return 'Documento PDF';
  return 'Documento General';
}

async function fileToB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function extractDocContent(file,b64){
  const isImg=file.type.startsWith('image/');
  const isPdf=file.type==='application/pdf';
  let content=[];
  if(isPdf||isImg){
    content=[{type:'image',source:{type:'base64',media_type:isPdf?'application/pdf':file.type,data:b64}}];
  } else {
    // For Word/text files, send as text request
    content=[{type:'text',text:`Analiza este documento llamado "${file.name}" y extrae la información clave de seguridad física que contiene: amenazas identificadas, incidentes registrados, vulnerabilidades detectadas, recomendaciones de seguridad, estadísticas delincuenciales y cualquier otro dato relevante para diagnósticos de seguridad. Resume en máximo 300 palabras en español.`}];
  }
  if(isPdf||isImg) content.push({type:'text',text:`Analiza este documento y extrae información clave de seguridad física: amenazas, incidentes, vulnerabilidades, estadísticas delincuenciales, recomendaciones. Resume en máximo 300 palabras.`});
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfg().apiKey||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:600,messages:[{role:'user',content}]})
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content.map(i=>i.text||'').join('').trim();
}

// NEW FORM
// ══════════════════════════════════════════════════════
function renderNew(){
  const p=document.getElementById('panel');
  p.innerHTML=stepsBar()+(REUSE?`<div class="mem-panel" style="margin-bottom:14px"><div class="mem-title">🔄 Datos reutilizados</div><div class="mem-item">Cliente <b>${REUSE.cliente}</b> — diagnóstico del ${REUSE.fecha}</div><div style="margin-top:6px"><button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="clearReuse()">✕ Limpiar</button></div></div>`:'')
    +'<div id="ez"></div><div id="sz"></div><div id="nz"></div>';
  renderStep();
}
function stepsBar(){
  let h='<div class="steps-bar">';
  STEPS.forEach((lbl,i)=>{
    const s=i<STEP?'done':i===STEP?'act':'pend';
    h+=`<div class="sn" onclick="jmpStep(${i})"><div class="sc ${s}">${i<STEP?'✓':(i+1)}</div><span class="sl ${i===STEP?'act':''}">${lbl}</span></div>`;
    if(i<STEPS.length-1) h+='<div class="sline"></div>';
  });
  return h+'</div>';
}
function renderStep(){
  if(ERR){document.getElementById('ez').innerHTML=`<div class="err">⚠️ ${ERR}</div>`;ERR=''}
  const fns=[sCliente,sEntorno,sInfra,sIncidentes,sImagenes,sRevision];
  document.getElementById('sz').innerHTML=`<div class="card">${fns[STEP]()}</div>`;
  document.getElementById('nz').innerHTML=STEP<5?`<div class="nav-row"><button class="btn btn-ghost" onclick="prevS()" ${STEP===0?'disabled':''}>← Anterior</button><button class="btn btn-red" onclick="nextS()">Siguiente →</button></div>`:'';
}
const nextS=()=>{if(STEP<5){STEP++;renderNew()}};
const prevS=()=>{if(STEP>0){STEP--;renderNew()}};
const jmpStep=i=>{if(i<=STEP){STEP=i;renderNew()}};
const clearReuse=()=>{REUSE=null;renderNew()};

// form helpers
function inp(lbl,k,ph,type='text'){
  const req=lbl.includes('*')?'<span class="req">*</span>':'';
  return`<div class="fld"><label>${lbl.replace('*','').trim()}${req}</label><input type="${type}" value="${esc(fv(k))}" placeholder="${ph}" oninput="fs('${k}',this.value)"></div>`;
}
function ta(lbl,k,rows,ph){return`<div class="fld"><label>${lbl}</label><textarea rows="${rows}" placeholder="${ph}" oninput="fs('${k}',this.value)">${esc(fv(k))}</textarea></div>`}
function sel(lbl,k,opts){return`<div class="fld"><label>${lbl}</label><select onchange="fs('${k}',this.value)">${opts.map(o=>`<option ${fv(k)===o?'selected':''}>${o}</option>`).join('')}</select></div>`}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// STEPS
function sCliente(){
  const mb=MOTIVOS.map(m=>`<button class="tag-opt ${fv('motivo')===m?'on':''}" onclick="fs('motivo','${m}');renderNew()">${m}</button>`).join('');
  return`<div class="card-h">🏢 Información del Cliente</div>

async function loadFromClaude(){

  if(!inp || !inp.value.trim()){toast('Pega el JSON de Claude primero','er');return}
  try{
    const text = inp.value.trim().replace(/```json|```/g,'').trim();
    DIAG = JSON.parse(text);
    DIAG._imgs = IMGS.map(i=>({name:i.name,b64:i.b64,note:i.note}));
    CUR_ID = CUR_ID||('d_'+Date.now());
    const entry={id:CUR_ID,fecha:new Date().toLocaleDateString('es-CO'),fechaISO:new Date().toISOString(),form:{...FORM},diag:DIAG};

function getKBContext(){return ddb().length>0}
function buildMemBlock(){
  const list=db();if(!list.length) return'';
  const n=fv('cliente').toLowerCase().trim();
  const city=fv('municipio').toLowerCase().trim();
  const same=list.filter(e=>e.form.cliente&&e.form.cliente.toLowerCase().trim()===n);

}

async function generate(){
  const btn=document.getElementById('btn-gen');
  if(btn){btn.disabled=true;btn.innerHTML='<span style="animation:spin .85s linear infinite;display:inline-block">⟳</span> Analizando…'}
  document.getElementById('panel').innerHTML=`<div class="loading-wrap">
    <div class="spin-ring"></div>
    <h2>Generando Diagnóstico FO-PI-09</h2>
    <p>Analizando formulario, imágenes y documentos de conocimiento<span class="dot"></span><br><br>
    <span style="font-size:11px;color:var(--sub)">Esto puede tardar entre 45 y 90 segundos.</span></p>
    <div class="prog-bar"><div class="prog-fill"></div></div>
  </div>`;
  try{
    let imgAnalysis='';
    if(IMGS.length>0) imgAnalysis=await analyzeImages();
    const hist=buildHistCtx();
    const kbCtx=buildKBCtx();
    const prompt=buildPrompt(hist,imgAnalysis,kbCtx);
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfg().apiKey||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:6000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const text=data.content.map(i=>i.text||'').join('');
    DIAG=JSON.parse(text.replace(/```json|```/g,'').trim());
    DIAG._imgAnalysis=imgAnalysis;
    DIAG._imgs=IMGS.map(i=>({name:i.name,b64:i.b64,note:i.note}));
    CUR_ID=CUR_ID||('d_'+Date.now());
    const entry={id:CUR_ID,fecha:new Date().toLocaleDateString('es-CO'),fechaISO:new Date().toISOString(),form:{...FORM},diag:DIAG};
    upsert(entry);
    await driveUpload(entry);
    toast('Diagnóstico generado y guardado');
    go('result');
  }catch(e){
    STEP=5;go('new');
    ERR='Error al generar: '+e.message;renderStep();
  }
}

async function analyzeImages(){
  const content=IMGS.slice(0,5).map(img=>({type:'image',source:{type:'base64',media_type:img.type||'image/jpeg',data:img.b64.split(',')[1]}}));
  content.push({type:'text',text:`Analiza estas imágenes de un recorrido de diagnóstico de seguridad física. Identifica: vulnerabilidades visibles, estado de infraestructura, riesgos evidentes y recomendaciones específicas. Responde en español en un párrafo conciso.`});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfg().apiKey||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content}]})});
    const d=await res.json();
    return d.content?.map(i=>i.text||'').join('')||'';
  }catch(e){return''}
}

function buildHistCtx(){
  const list=db();if(!list.length) return'';
  const n=fv('cliente').toLowerCase().trim();
  const city=fv('municipio').toLowerCase().trim();
  let ctx='';
  const same=list.filter(e=>e.form.cliente&&e.form.cliente.toLowerCase().trim()===n);
  if(same.length){
    ctx+=`\nDIAGNÓSTICOS PREVIOS DE "${fv('cliente')}":\n`;
    same.forEach(e=>{
      const a=(e.diag?.riesgos||[]).filter(r=>r.nivel==='ALTO').map(r=>r.area+'/'+r.amenaza).join(', ');
      ctx+=`- ${e.fecha} | ${e.form.sede} | ALTO: ${a||'ninguno'}\n`;
      if(e.form.incidentes) ctx+=`  Incidentes: ${e.form.incidentes.slice(0,200)}\n`;
      if(e.diag?.conclusiones) ctx+=`  Conclusiones previas: ${e.diag.conclusiones.slice(0,200)}\n`;
    });
  }
  const others=list.filter(e=>!same.includes(e)&&e.form.municipio&&e.form.municipio.toLowerCase().trim()===city).slice(0,3);
  if(others.length){
    ctx+=`\nOTROS CLIENTES EN ${fv('municipio').toUpperCase()}:\n`;
    others.forEach(e=>{const a=(e.diag?.riesgos||[]).filter(r=>r.nivel==='ALTO').length;ctx+=`- ${e.form.cliente}: ${a} riesgos ALTO\n`});
  }
  return ctx;
}

function buildKBCtx(){
  const docs=ddb();if(!docs.length) return'';
  let ctx='\nBASE DE CONOCIMIENTO (documentos analizados):\n';
  docs.forEach(d=>{if(d.content||d.summary) ctx+=`[${d.category}] ${d.name}: ${(d.content||d.summary).slice(0,300)}\n`});
  return ctx;
}

function buildHC(e){

  const nc=a>=3?'var(--red)':a>=1?'var(--gold)':'var(--grn)';
  const hi=(e.diag?._imgs||[]).length;
  return`<div class="hc">
    <div class="hc-cli">${e.form.cliente||'Sin nombre'}</div>
    <div class="hc-sed">${e.form.sede||''} · ${e.form.municipio||''}</div>
    <div class="hc-tags">
      <span class="hc-tag">📅 ${e.fecha}</span>
      <span class="hc-tag" style="color:${nc}">${a} ALTO · ${m} MEDIO</span>
      ${hi?`<span class="hc-tag">📸 ${hi}</span>`:''}
    </div>
    <div class="hc-acts">
      <button class="hca hca-b" onclick="openEntry('${e.id}')">👁 Ver</button>
      <button class="hca hca-g" onclick="reuseEntry('${e.id}')">🔄 Reutilizar</button>
      <button class="hca hca-g" onclick="dlEntry('${e.id}')">⬇️ Word</button>
      <button class="hca hca-r" onclick="delEntry('${e.id}')">🗑</button>

  </div>`;
}
function openEntry(id){const e=db().find(x=>x.id===id);if(!e)return;FORM={...e.form};DIAG={...e.diag};CUR_ID=id;go('result')}
function reuseEntry(id){const e=db().find(x=>x.id===id);if(!e)return;FORM={...e.form};REUSE={cliente:e.form.cliente,fecha:e.fecha};DIAG=null;CUR_ID=null;IMGS=[];STEP=0;go('new')}
function dlEntry(id){const e=db().find(x=>x.id===id);if(!e)return;const pr={form:FORM,diag:DIAG};FORM=e.form;DIAG=e.diag;const h=buildDocHTML();FORM=pr.form;DIAG=pr.diag;triggerDl(h,e.form.cliente,e.fecha)}
function delEntry(id){const e=db().find(x=>x.id===id);if(!e)return;if(confirm(`¿Eliminar diagnóstico de "${e.form.cliente}"?`)){remove(id);renderHist();toast('Eliminado','er')}}
function startNew(){FORM=mkForm();DIAG=null;CUR_ID=null;REUSE=null;IMGS=[];STEP=0;go('new')}

let driveToken=null;
function loadGis(){return new Promise(r=>{if(window.google?.accounts){r();return}const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=r;document.head.appendChild(s)})}
function loadGapi(){return new Promise(r=>{if(window.gapi){r();return}const s=document.createElement('script');s.src='https://apis.google.com/js/api.js';s.onload=()=>window.gapi.load('client',r);document.head.appendChild(s)})}
async function ensureDriveToken(){
  const c=cfg();if(!c.driveClientId)return false;
  await loadGis();await loadGapi();
  await window.gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
  return new Promise(r=>{
    const tc=window.google.accounts.oauth2.initTokenClient({
      client_id:c.driveClientId,scope:'https://www.googleapis.com/auth/drive.file',
      callback:res=>{if(res.access_token){driveToken=res.access_token;r(true)}else r(false)}
    });
    tc.requestAccessToken({prompt:''});
  });
}
async function getOrCreateFolder(name){
  let r=await gapi.client.drive.files.list({q:`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id)'});
  if(r.result.files.length)return r.result.files[0].id;
  let cr=await gapi.client.drive.files.create({resource:{name,mimeType:'application/vnd.google-apps.folder'},fields:'id'});
  return cr.result.id;
}
async function driveUpload(entry){
  const c=cfg();if(!c.driveClientId)return;
  try{
    const ok=await ensureDriveToken();if(!ok)return;
    const fid=await getOrCreateFolder(c.driveFolderName||'G4S Diagnósticos');
    const base=`Diagnostico_${(entry.form.cliente||'cliente').replace(/\s+/g,'_')}_${entry.fecha.replace(/\//g,'-')}`;
    // Upload JSON
    const jblob=new Blob([JSON.stringify(entry,null,2)],{type:'application/json'});
    const jf=new FormData();
    jf.append('metadata',new Blob([JSON.stringify({name:base+'.json',parents:[fid]})],{type:'application/json'}));
    jf.append('file',jblob);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+driveToken},body:jf});
    // Upload Word doc
    const dblob=new Blob([buildDocHTML()],{type:'application/msword'});
    const df=new FormData();
    df.append('metadata',new Blob([JSON.stringify({name:base+'.doc',parents:[fid]})],{type:'application/json'}));
    df.append('file',dblob);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+driveToken},body:df});
    toast('☁️ Guardado en Google Drive');
  }catch(e){console.warn('Drive:',e)}
}

// AUTO-RECONNECT DRIVE ON STARTUP
async function autoReconnectDrive(){
  const c=cfg();
  if(!c.driveClientId) return;
  try{
    await loadGis(); await loadGapi();
    await window.gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    const tc=window.google.accounts.oauth2.initTokenClient({
      client_id:c.driveClientId,
      scope:'https://www.googleapis.com/auth/drive.file',
      callback:res=>{
        if(res.access_token){
          driveToken=res.access_token;
          document.getElementById('drv-badge').className='dp-status on';
          document.getElementById('drv-badge').textContent='Conectado';
          document.getElementById('drv-sub').textContent='Sync automático activo';
          document.getElementById('drv-chip').style.display='';
          sbRefresh();
        }
      }
    });
    // Silent reconnect - no prompt
    tc.requestAccessToken({prompt:''});
  }catch(e){ console.log('Drive auto-reconnect silent fail:', e); }
}

// INIT
// ══════════════════════════════════════════════════════
sbRefresh();
go('dash');
// Auto-reconnect Drive silently after 2 seconds
setTimeout(autoReconnectDrive, 2000);
